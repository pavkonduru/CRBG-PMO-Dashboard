/* ── MIME .eml builder ── */
const _b64utf8=s=>btoa(unescape(encodeURIComponent(s)));
const _b64lines=b=>b.replace(/.{1,76}/g,"$&\r\n");
const _mimePart=(asset,disp)=>{
  const a=window.EMAIL_ASSETS[asset];
  let h="Content-Type: "+a.mime+(a.name?'; name="'+a.name+'"':"")+"\r\n";
  h+="Content-Transfer-Encoding: base64\r\n";
  if(disp==="inline")h+="Content-ID: <"+a.cid+">\r\nContent-Disposition: inline; filename=\""+a.name+"\"\r\n";
  else h+="Content-Disposition: attachment; filename=\""+a.name+"\"\r\n";
  return h+"\r\n"+_b64lines(a.b64);
};
const buildEml=(cfg)=>{
  const MIX="MIXED_"+cfg.subject.length, REL="RELATED_"+cfg.html.length;
  let m="";
  m+=(cfg.to?"To: "+cfg.to+"\r\n":"");
  m+=(cfg.cc?"Cc: "+cfg.cc+"\r\n":"");
  m+="Subject: "+cfg.subject+"\r\n";
  m+="X-Unsent: 1\r\n";  // tells Outlook to open as an editable, sendable draft
  m+="MIME-Version: 1.0\r\n";
  const hasAtt=(cfg.attachments||[]).length>0;
  if(hasAtt){m+='Content-Type: multipart/mixed; boundary="'+MIX+'"\r\n\r\n--'+MIX+'\r\n';}
  m+='Content-Type: multipart/related; boundary="'+REL+'"\r\n\r\n';
  m+='--'+REL+'\r\nContent-Type: text/html; charset="utf-8"\r\nContent-Transfer-Encoding: base64\r\n\r\n'+_b64lines(_b64utf8(cfg.html))+'\r\n';
  (cfg.inline||[]).forEach(a=>{m+='--'+REL+'\r\n'+_mimePart(a,"inline")+'\r\n';});
  m+='--'+REL+'--\r\n';
  if(hasAtt){(cfg.attachments||[]).forEach(a=>{m+='--'+MIX+'\r\n'+_mimePart(a,"attachment")+'\r\n';});m+='--'+MIX+'--\r\n';}
  return m;
};
const sendEmail=(cfg)=>{
  if(!window.EMAIL_ASSETS){alert("email_assets.js not loaded — keep it in the same folder as this file.");return;}
  const blob=new Blob([buildEml(cfg)],{type:"message/rfc822"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=cfg.subject.replace(/[\\/:*?"<>|]/g,"_").slice(0,80)+".eml";a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
};

/* ══════════ SQLite DB LAYER ══════════ */
const DB_SK="crbg-pmo-db-v1";
const OLD_SK="crbg-pmo-portal-v2";
let _db=null;

const DB_COLS=["id","name","email","level","region","location","status",
  "onboardingDate","offboardingDate","pmdLead","smLead","manager",
  "feedbackProvider","initiativeCluster","initiative","function",
  "subFunction","crbgManager","vdi","crbgEmail","mobile","wbsCode","category","active"];

const DB_SCHEMA=`CREATE TABLE IF NOT EXISTS resources (
  id INTEGER PRIMARY KEY,
  name TEXT, email TEXT, level TEXT, region TEXT, location TEXT,
  status TEXT, onboardingDate TEXT, offboardingDate TEXT,
  pmdLead TEXT, smLead TEXT, manager TEXT, feedbackProvider TEXT,
  initiativeCluster TEXT, initiative TEXT, function TEXT,
  subFunction TEXT, crbgManager TEXT, vdi TEXT, crbgEmail TEXT,
  mobile TEXT, wbsCode TEXT, category TEXT, active TEXT
)`;

async function openDB(){
  const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
  const saved=localStorage.getItem(DB_SK);
  if(saved){
    // decode base64 in chunks to avoid call stack overflow on large DBs
    const b64=atob(saved);
    const buf=new Uint8Array(b64.length);
    for(let i=0;i<b64.length;i++)buf[i]=b64.charCodeAt(i);
    _db=new SQL.Database(buf);
  } else {
    _db=new SQL.Database();
    _db.run(DB_SCHEMA);
    // migrate old localStorage JSON data if present, else seed defaults
    let seed=DEFAULT_RESOURCES;
    try{const old=localStorage.getItem(OLD_SK);if(old)seed=JSON.parse(old);}catch(e){}
    seed.forEach(r=>_dbInsert(r));
    localStorage.removeItem(OLD_SK);
    _persistDB();
  }
  return _db;
}

function _persistDB(){
  const raw=_db.export();
  let b64="";
  const chunk=8192;
  for(let i=0;i<raw.length;i+=chunk)b64+=String.fromCharCode.apply(null,raw.subarray(i,i+chunk));
  localStorage.setItem(DB_SK,btoa(b64));
}

function _dbInsert(r){
  const vals=DB_COLS.map(c=>r[c]!==undefined?r[c]:null);
  _db.run(`INSERT OR REPLACE INTO resources (${DB_COLS.join(",")}) VALUES (${DB_COLS.map(()=>"?").join(",")})`,vals);
}

function _dbUpdate(r){
  const setCols=DB_COLS.filter(c=>c!=="id").map(c=>`${c}=?`).join(",");
  const vals=[...DB_COLS.filter(c=>c!=="id").map(c=>r[c]!==undefined?r[c]:null),r.id];
  _db.run(`UPDATE resources SET ${setCols} WHERE id=?`,vals);
}

function _dbDelete(id){_db.run("DELETE FROM resources WHERE id=?",[id]);}

function _dbAll(){
  const res=_db.exec("SELECT * FROM resources ORDER BY id");
  if(!res.length)return[];
  const{columns,values}=res[0];
  return values.map(row=>{const obj={};columns.forEach((c,i)=>obj[c]=row[i]);return obj;});
}

function exportDB(){
  const raw=_db.export();
  const blob=new Blob([raw],{type:"application/octet-stream"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="CRBG_PMO_Data.db";a.click();
  URL.revokeObjectURL(url);
}

function importDBFile(file,onDone){
  const reader=new FileReader();
  reader.onload=async e=>{
    const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
    _db=new SQL.Database(new Uint8Array(e.target.result));
    _persistDB();
    onDone(_dbAll());
  };
  reader.readAsArrayBuffer(file);
}

/* ══════════ IMPORT MODAL ══════════ */
const ImportModal=({onClose,onImport,currentCount})=>{
  const [parsed,setParsed]=React.useState(null);
  const [mode,setMode]=React.useState("merge");
  const [loading,setLoading]=React.useState(false);
  const [error,setError]=React.useState("");
  const [confirmReplace,setConfirmReplace]=React.useState(false);
  const fmtD2=(v)=>{if(!v)return"";if(v instanceof Date)return v.toISOString().slice(0,10);const s=String(v).trim();if(s.match(/^\d{4}-\d{2}-\d{2}/))return s.slice(0,10);try{const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10)}catch(e){}return""};
  const handleFile=(f)=>{
    if(!f)return;setLoading(true);setError("");setParsed(null);
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:"array",cellDates:true});
        const sn=wb.SheetNames.includes("Sheet5")?"Sheet5":wb.SheetNames[0];
        const ws=wb.Sheets[sn];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        const valid=rows.filter(r=>(r["Name"]||"").trim());
        setParsed({sheetName:sn,count:valid.length,rows:valid,preview:valid.slice(0,5)});
      }catch(ex){setError("Could not parse file: "+ex.message);}
      setLoading(false);
    };
    reader.readAsArrayBuffer(f);
  };
  const doImport=()=>{
    if(!parsed)return;
    const mapped=parsed.rows.map((r,i)=>({
      id:Date.now()+i,
      name:(r["Name"]||"").trim(),
      email:(r["Deloitte Email"]||r["Deloitte Email ID"]||"").trim(),
      level:(r["Level"]||r["Level "]||"").trim(),
      region:(r["Region"]||"").trim(),
      location:(r["Location City"]||"").trim(),
      status:(r["Status"]||"Onboarded").trim(),
      onboardingDate:fmtD2(r["Practitioner Onboarding date"]||r["Onboarding date"]||""),
      offboardingDate:fmtD2(r["Practicioner Offboarding date"]||r["Offboarding date"]||""),
      pmdLead:(r["PMD Lead"]||"").trim(),
      smLead:(r["SM Lead"]||"").trim(),
      manager:(r["Manager"]||"").trim(),
      feedbackProvider:(r["Feedback Provider"]||"").trim(),
      initiativeCluster:(r["Initiative Cluster"]||"").trim(),
      initiative:(r["Initiative"]||"").trim(),
      function:(r["Function"]||r["Initiative Cluster"]||"").trim(),
      subFunction:(r["Sub-Function"]||r["Sub-Function "]||"").trim(),
      crbgManager:(r["Corebridge manager"]||r["CRBG Manager"]||"").trim(),
      vdi:(r["VDI"]||r["VDI Access? Yes/No"]||"").trim(),
      crbgEmail:(r["Corebridge email"]||"").trim(),
      mobile:(r["Contact Number"]||"").trim(),
      wbsCode:(r["WBS Code"]||"").trim(),
      category:(r["Category"]||"").trim(),
      active:(r["Status"]||"")!=="Offboarded"?"Yes":"No",
    })).filter(r=>r.name);
    onImport(mapped,mode);onClose();
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:40,overflowY:"auto"}}>
    <div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:580,boxShadow:"0 8px 32px rgba(0,0,0,0.2)",marginBottom:30}}>
      <div style={{background:"#282728",padding:"16px 24px",borderRadius:"12px 12px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{color:"#fff",fontSize:16,fontWeight:700}}>&#x1F4CA; Import from Excel</div><div style={{color:"#A0A0A0",fontSize:11,marginTop:2}}>Upload the CRBG Resource Tracker .xlsx file &mdash; Sheet5 is used automatically</div></div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#A0A0A0",fontSize:22,cursor:"pointer"}}>&times;</button>
      </div>
      <div style={{padding:24}}>
        <div style={{border:"2px dashed #E6E6E6",borderRadius:10,padding:24,textAlign:"center",marginBottom:20,background:"#FAFAFA"}}>
          <div style={{fontSize:32,marginBottom:8}}>&#x1F4C2;</div>
          <div style={{fontSize:13,color:"#555",marginBottom:12}}>Select <b>CRBG - Modernization - Resource Tracker.xlsx</b></div>
          <input type="file" accept=".xlsx,.xls" onChange={e=>handleFile(e.target.files[0])} style={{display:"block",margin:"0 auto",fontSize:12}}/>
          <div style={{fontSize:10,color:"#888",marginTop:8}}>Reads Sheet5 columns: Name, Level, Deloitte Email, Region, Location City, Status, Manager, Initiative, etc.</div>
        </div>
        {loading&&<div style={{textAlign:"center",color:"#555",padding:16,fontSize:13}}>&#x23F3; Reading file...</div>}
        {error&&<div style={{background:"#FFEBEE",border:"1px solid #DA291C",borderRadius:8,padding:12,color:"#9C0006",fontSize:12,marginBottom:12}}>{error}</div>}
        {parsed&&<div>
          <div style={{background:"#E8F5E0",border:"1px solid #86BC25",borderRadius:8,padding:12,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"#276221"}}>&#x2713; Found {parsed.count} valid resources in sheet &ldquo;{parsed.sheetName}&rdquo;</div>
            <div style={{fontSize:11,color:"#555",marginTop:4}}>Preview: {parsed.preview.map(r=>r["Name"]).join(", ")}{parsed.count>5&&", ..."}</div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:10,textTransform:"uppercase",color:"#555",letterSpacing:"0.05em"}}>Import Mode</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <label style={{display:"flex",alignItems:"flex-start",gap:10,padding:12,border:"2px solid "+(mode==="merge"?"#86BC25":"#E6E6E6"),borderRadius:8,cursor:"pointer",background:mode==="merge"?"#F9FFF2":"#fff"}} onClick={()=>setMode("merge")}>
                <input type="radio" name="impmode" value="merge" checked={mode==="merge"} onChange={()=>setMode("merge")} style={{marginTop:2}}/>
                <div><div style={{fontSize:13,fontWeight:600}}>Merge &mdash; Add new entries only</div><div style={{fontSize:11,color:"#666",marginTop:2}}>Keeps all {currentCount} existing records. Adds only entries whose email is not already in the portal.</div></div>
              </label>
              <label style={{display:"flex",alignItems:"flex-start",gap:10,padding:12,border:"2px solid "+(mode==="replace"?"#DA291C":"#E6E6E6"),borderRadius:8,cursor:"pointer",background:mode==="replace"?"#FFF8F8":"#fff"}} onClick={()=>{setMode("replace");setConfirmReplace(false)}}>
                <input type="radio" name="impmode" value="replace" checked={mode==="replace"} onChange={()=>{setMode("replace");setConfirmReplace(false)}} style={{marginTop:2}}/>

};

            <div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",overflow:"hidden"}}>
              <div style={{padding:"14px 20px",background:"#282728",fontSize:13,fontWeight:700,color:"#fff",display:"flex",justifyContent:"space-between"}}><span>Active Team</span><span style={{color:"#A0A0A0",fontSize:11}}>{activeCount} members</span></div>
              <div style={{overflowX:"auto",maxHeight:500}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#F7F7F7",position:"sticky",top:0}}>{["Name","Level","Location","Initiative","Manager","Status"].map((h,i)=><th key={i} style={{padding:"10px 14px",textAlign:"left",fontSize:10,fontWeight:700,textTransform:"uppercase",color:"#555"}}>{h}</th>)}</tr></thead><tbody>{resources.filter(r=>r.status!=="Offboarded").sort((a,b)=>a.name.localeCompare(b.name)).map((r,idx)=><tr key={r.id} style={{background:idx%2===0?"#fff":"#FAFAFA",borderBottom:"1px solid #F0F0F0",cursor:"pointer"}} onClick={()=>setSelId(r.id)}><td style={{padding:"10px 14px",fontWeight:600,whiteSpace:"nowrap",color:"#00A3E0"}}>{r.name}</td><td style={{padding:"10px 14px",color:"#666"}}>{r.level||"\u2014"}</td><td style={{padding:"10px 14px",color:"#666"}}>{r.location||"\u2014"}</td><td style={{padding:"10px 14px",color:r.initiative?"#282728":"#E8A317",fontWeight:r.initiative?400:600}}>{r.initiative||"Unassigned"}</td><td style={{padding:"10px 14px",color:"#666"}}>{r.manager||"\u2014"}</td><td style={{padding:"10px 14px"}}><StatusBadge status={r.status}/></td></tr>)}</tbody></table></div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:13,fontWeight:700,marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>By Initiative</span><span style={{fontSize:10,color:"#888",fontWeight:400}}>click to view team</span></div><div style={{fontSize:10,color:"#86BC25",marginBottom:10,fontWeight:600}}>&#x1F4CB; {byInitiative.filter(x=>x[0]!=="Unassigned").length} active initiatives</div>{byInitiative.slice(0,12).map(([init,cnt],i)=><div key={i} onClick={()=>{setPage("roster");setFInitiative(init);setFilter("All")}} style={{marginBottom:8,cursor:"pointer",padding:"4px 6px",borderRadius:6,transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background="#F5F5F5"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{fontWeight:600,color:"#282728"}}>{init}</span><span style={{fontWeight:700,color:"#86BC25"}}>{cnt} &rsaquo;</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:10}}><div style={{width:(cnt/maxInit*100)+"%",height:"100%",background:"#86BC25",borderRadius:4,minWidth:10}}/></div></div>)}</div>
              <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:13,fontWeight:700,marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>By Manager</span><span style={{fontSize:10,color:"#888",fontWeight:400}}>click to view team</span></div><div style={{fontSize:10,color:"#00A3E0",marginBottom:10,fontWeight:600}}>&#x1F464; {byManager.length} managers</div>{byManager.slice(0,12).map(([m,c],i)=>{const pct=activeCount?Math.round(c/activeCount*100):0;return <div key={i} onClick={()=>{setPage("roster");setFManager(m);setFilter("All")}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,padding:"5px 6px",borderRadius:6,cursor:"pointer",marginBottom:2,transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background="#F0F8FF"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}><div style={{width:28,height:28,borderRadius:"50%",background:"#E3F2FD",color:"#00A3E0",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{(m||"").split(/[, ]/)[0].charAt(0).toUpperCase()}</div><span style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m}</span></div><div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}><div style={{width:36,background:"#E6E6E6",borderRadius:3,height:6}}><div style={{width:(c/Math.max(...byManager.map(x=>x[1]),1)*100)+"%",height:"100%",background:"#00A3E0",borderRadius:3}}/></div><span style={{fontWeight:700,color:"#00A3E0",minWidth:16,textAlign:"right"}}>{c}</span></div></div>})}</div>
              <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:13,fontWeight:700,marginBottom:10}}>By Location</div>{byLocation.slice(0,8).map(([loc,cnt],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}><span style={{fontSize:11,fontWeight:600}}>{loc}</span><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:50,background:"#E6E6E6",borderRadius:3,height:8}}><div style={{width:(cnt/maxLoc*100)+"%",height:"100%",background:"#00A3E0",borderRadius:3}}/></div><span style={{fontSize:11,fontWeight:700,width:20,textAlign:"right"}}>{cnt}</span></div></div>)}</div>
            </div>
          </div>
        </>}

        {page==="roster"&&<>
          <SectionTitle icon="\uD83D\uDC65" title="Resource Tracker" sub={total+" entries from workbook"} right={isAdmin&&<button onClick={()=>setShowAdd(true)} style={{padding:"6px 14px",background:"#86BC25",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add Resource</button>}/>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
            {[["All","#282728",total],["Active","#86BC25",activeCount],["Offboarded","#888",offboarded],["US","#00A3E0",usCount],["USI","#005587",usiCount]].map(([f,ac,cnt])=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 16px",background:filter===f?ac:"#fff",color:filter===f?"#fff":"#555",border:"1px solid "+(filter===f?ac:"#E6E6E6"),borderRadius:20,fontSize:12,fontWeight:filter===f?700:400,cursor:"pointer"}}>{f} ({cnt})</button>)}
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, email, initiative, manager..." style={{padding:"6px 14px",borderRadius:20,border:"1px solid #E6E6E6",fontSize:12,width:300}}/>
            <div style={{marginLeft:"auto",fontSize:11,color:"#888"}}>{filtered.length} of {total}</div>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
            <select value={fManager} onChange={e=>setFManager(e.target.value)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+(fManager?"#00A3E0":"#E6E6E6"),fontSize:12,background:fManager?"#E3F2FD":"#fff",minWidth:180,cursor:"pointer"}}><option value="">&#x1F464; All Managers</option>{allManagersList.map(m=><option key={m} value={m}>{m}</option>)}</select>
            <select value={fInitiative} onChange={e=>setFInitiative(e.target.value)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+(fInitiative?"#86BC25":"#E6E6E6"),fontSize:12,background:fInitiative?"#F9FFF2":"#fff",minWidth:180,cursor:"pointer"}}><option value="">&#x1F4CB; All Initiatives</option>{allInitiativesList.map(i=><option key={i} value={i}>{i}</option>)}</select>
            <select value={fLevel} onChange={e=>setFLevel(e.target.value)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+(fLevel?"#005587":"#E6E6E6"),fontSize:12,background:fLevel?"#EEF4FF":"#fff",minWidth:130,cursor:"pointer"}}><option value="">&#x1F3AF; All Levels</option>{allLevelsList.map(l=><option key={l} value={l}>{l}</option>)}</select>
            {(fManager||fInitiative||fLevel)&&<button onClick={()=>{setFManager("");setFInitiative("");setFLevel("")}} style={{padding:"5px 12px",background:"#F5F5F5",border:"1px solid #E6E6E6",borderRadius:6,fontSize:11,cursor:"pointer",color:"#555"}}>&times; Clear</button>}
            {fManager&&<div style={{fontSize:11,color:"#005587",fontWeight:600,background:"#E3F2FD",padding:"3px 10px",borderRadius:12,whiteSpace:"nowrap"}}>&#x1F464; {fManager}&rsquo;s team &mdash; {filtered.length} member{filtered.length!==1?"s":""}</div>}
          </div>
          <div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",overflow:"hidden"}}>
            <div style={{overflowX:"auto",maxHeight:"calc(100vh / 0.85 - 240px)"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#282728",position:"sticky",top:0,zIndex:2}}>
                <SortHeader label="Name" field="name" sortState={sort} onSort={toggleSort}/><SortHeader label="Level" field="level" sortState={sort} onSort={toggleSort}/><SortHeader label="Email" field="email" sortState={sort} onSort={toggleSort}/><SortHeader label="Region" field="region" sortState={sort} onSort={toggleSort}/><SortHeader label="Location" field="location" sortState={sort} onSort={toggleSort}/><SortHeader label="Initiative" field="initiative" sortState={sort} onSort={toggleSort}/><SortHeader label="Manager" field="manager" sortState={sort} onSort={toggleSort}/><SortHeader label="CRBG Manager" field="crbgManager" sortState={sort} onSort={toggleSort}/><SortHeader label="Status" field="status" sortState={sort} onSort={toggleSort}/><SortHeader label="Tenure" field="onboardingDate" sortState={sort} onSort={toggleSort}/>
                {isAdmin&&<th style={{padding:"10px 10px",color:"#E6E6E6",fontSize:10,fontWeight:600,textTransform:"uppercase",whiteSpace:"nowrap"}}>Actions</th>}
              </tr></thead>
              <tbody>{filtered.map((r,idx)=><tr key={r.id} style={{background:idx%2===0?"#fff":"#FAFAFA",borderBottom:"1px solid #F0F0F0"}}>
                <td onClick={()=>setSelId(r.id)} style={{padding:"10px 10px",fontWeight:600,whiteSpace:"nowrap",cursor:"pointer",color:"#00A3E0"}}>{r.name}</td>
                <td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.level||"\u2014"}</td>
                <td style={{padding:"10px 10px",fontSize:11,color:"#555"}}>{r.email||"\u2014"}</td>
                <td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.region||"\u2014"}</td>
                <td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.location||"\u2014"}</td>
                <td style={{padding:"10px 10px",color:r.initiative?"#282728":"#E8A317",fontWeight:r.initiative?400:600,fontSize:11}}>{r.initiative||"\u2014"}</td>
                <td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.manager||"\u2014"}</td>
                <td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.crbgManager||"\u2014"}</td>
                <td style={{padding:"10px 10px"}}><StatusBadge status={r.status}/></td>
                <td style={{padding:"10px 10px",fontSize:11,color:"#888",whiteSpace:"nowrap"}}>{calcTenure(r.onboardingDate)||"\u2014"}</td>
                {isAdmin&&<td style={{padding:"10px 6px",whiteSpace:"nowrap"}}><div style={{display:"flex",gap:3}}>
                  <button onClick={()=>setSelId(r.id)} title="Edit Record" style={{padding:"3px 7px",background:"#86BC25",color:"#fff",borderRadius:4,fontSize:10,fontWeight:700,border:"none",cursor:"pointer"}}>&#x270F;</button>
                  <button onClick={()=>{if(confirm("Delete "+r.name+"? This cannot be undone."))deleteRes(r.id)}} title="Delete Entry" style={{padding:"3px 7px",background:"#DA291C",color:"#fff",borderRadius:4,fontSize:10,fontWeight:700,border:"none",cursor:"pointer"}}>&#x1F5D1;</button>
                  <button onClick={()=>sendEmail(emailWelcome(r))} title="Welcome Email (.eml → opens in Outlook with PDF attached)" style={{padding:"3px 6px",background:"#00A3E0",color:"#fff",borderRadius:4,fontSize:9,fontWeight:700,border:"none",cursor:"pointer"}}>&#x1F4E7;</button>
                </div></td>}
              </tr>)}</tbody>
            </table></div>
          </div>
        </>}


        {page==="analytics"&&<>
          <SectionTitle icon="\uD83D\uDCC8" title="Analytics & Reports" sub="Breakdowns by initiative, manager, feedback provider, region, location, and level"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
            <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Team Count by Initiative</div>{byInitiative.map(([init,cnt],i)=><div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{init}</span><span style={{fontWeight:700}}>{cnt}</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:14}}><div style={{width:(cnt/maxInit*100)+"%",height:"100%",background:"#86BC25",borderRadius:4,minWidth:14}}/></div></div>)}</div>
            <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Team Count by Manager</div>{byManager.length===0?<div style={{color:"#888",fontSize:12,textAlign:"center",padding:20}}>No manager data</div>:byManager.slice(0,12).map(([m,c],i)=><div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{m}</span><span style={{fontWeight:700}}>{c}</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:14}}><div style={{width:(c/Math.max(...byManager.map(x=>x[1]),1)*100)+"%",height:"100%",background:"#00A3E0",borderRadius:4,minWidth:14}}/></div></div>)}</div>
            <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Team Count by Feedback Provider</div>{byFeedback.length===0?<div style={{color:"#888",fontSize:12,textAlign:"center",padding:20}}>No feedback provider data</div>:byFeedback.slice(0,12).map(([fp,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"6px 0",borderBottom:"1px solid #F0F0F0"}}><span style={{fontWeight:600}}>{fp}</span><span style={{fontWeight:700}}>{c}</span></div>)}</div>
            <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Distribution by Region</div>{byRegion.map(([r,c],i)=>{const pct=activeCount?Math.round(c/activeCount*100):0;return <div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{r}</span><span style={{fontWeight:700}}>{c} ({pct}%)</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:14}}><div style={{width:pct+"%",height:"100%",background:"#005587",borderRadius:4,minWidth:14}}/></div></div>})}</div>
            <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>By Level</div>{byLevel.map(([l,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"6px 0",borderBottom:"1px solid #F0F0F0"}}><span style={{fontWeight:600}}>{l}</span><span style={{fontWeight:700}}>{c}</span></div>)}</div>
            <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Status Summary</div><div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{(()=>{const m={};resources.forEach(r=>{const s=r.status||"Unknown";m[s]=(m[s]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([s,c],i)=><div key={i} style={{background:"#F9F9F9",borderRadius:8,padding:"14px 20px",minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>{s}</div><div style={{fontSize:28,fontWeight:700}}>{c}</div></div>)})()}</div></div>
          </div>
        </>}
      </div>
    </div>
    {sel&&<ResourceModal resource={sel} onClose={()=>setSelId(null)} onSave={save} onDelete={deleteRes} isAdmin={isAdmin}/>}
    {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={add} nid={nid}/>}
    {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImport={importResources} currentCount={total}/>}
    {showLogin&&<AdminLogin onLogin={()=>{setIsAdmin(true);setShowLogin(false)}} onClose={()=>setShowLogin(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
