const emailWelcome=(r)=>{

  const sub=encodeURIComponent("Welcome to Corebridge- Onboarding Formalities");
  const name1=r.name.includes(",")?r.name.split(",")[0].trim():r.name.split(" ")[0];
  const body=encodeURIComponent("Hi "+name1+" - Welcome to Corebridge Team!\n\nCorebridge Financial is a leading provider of retirement, life insurance, and institutional solutions, empowering individuals and organizations to secure their financial futures.\n\nYou will be a part of \""+(r.initiative||"Modernization")+"\" workstream.\n\nPlease follow the below steps to complete your on-boarding:\n\n1. Alignment & Leads: You will be part of the "+(r.function||"ADR / Data and Reporting")+" function. Your functional lead will be "+(r.manager||"[TBD]")+".\n\n2. Charge Code: Please check with your Function lead on the WBS to update both MySource & DTE.\n\n3. Role Start: Your role start date is "+(r.onboardingDate||"[TBD]")+". Please charge your hours in DTE starting this date.\n\n4. Know your Leadership: The below links will help you understand the leadership structure.\n\nIf you have any questions at any point, please reach out- US USI CRBG GH PMO Team (ususicrbgghpmoteam@deloitte.com).\n\nThank you,\nCRBG PMO Team\n\n[Please attach: CRBG PMO Referrence Document_v2.pdf]");
  return "mailto:"+encodeURIComponent(r.email||"")+"?cc="+encodeURIComponent(cc)+"&subject="+sub+"&body="+body;
};
const emailAccessRequest=(r)=>{

const emailOnboardingNotification=(r)=>{

/* ══════════ UTILS ══════════ */
const fmtDate=d=>{if(!d)return"\u2014";try{const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"})}catch(e){return d}};
const StatusBadge=({status})=>{const map={Onboarded:{bg:"#E8F5E0",c:"#276221"},Active:{bg:"#E8F5E0",c:"#276221"},Offboarded:{bg:"#F5F5F5",c:"#888"},"Pending Onboarding":{bg:"#FFF8E1",c:"#7F4F00"},"To Onboard":{bg:"#FFF8E1",c:"#7F4F00"}};const s=map[status]||{bg:"#F5F5F5",c:"#888"};return <span style={{background:s.bg,color:s.c,borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{status||"\u2014"}</span>};
const SortHeader=({label,field,sortState,onSort})=>{const active=sortState.field===field;const arrow=active?(sortState.asc?"\u25B2":"\u25BC"):"\u21C5";return <th onClick={()=>onSort(field)} style={{padding:"10px 10px",textAlign:"left",color:"#E6E6E6",fontSize:10,fontWeight:600,textTransform:"uppercase",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}}>{label} <span style={{fontSize:8,opacity:active?1:0.4,marginLeft:2}}>{arrow}</span></th>};
const SectionTitle=({icon,title,sub,right})=><div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}><div><div style={{fontSize:18,fontWeight:700}}>{icon} {title}</div>{sub&&<div style={{fontSize:12,color:"#888",marginTop:2}}>{sub}</div>}</div>{right&&<div className="no-print">{right}</div>}</div>;
const downloadCSV=(list,filename)=>{const h="Name,Email,Level,Region,Location,Initiative,Function,Manager,Feedback Provider,Status,Onboarding Date,Offboarding Date,CRBG Manager\n";const rows=list.map(i=>[i.name,i.email,i.level,i.region,i.location,i.initiative,i.function,i.manager,i.feedbackProvider,i.status,i.onboardingDate,i.offboardingDate,i.crbgManager].map(v=>'"'+(v||"").replace(/"/g,'""')+'"').join(",")).join("\n");const b=new Blob([h+rows],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=filename+".csv";a.click();URL.revokeObjectURL(u)};

/* ══════════ ADMIN LOGIN ══════════ */
const AdminLogin=({onLogin,onClose})=>{const [pin,setPin]=useState("");const [err,setErr]=useState("");const check=()=>{let sp;try{sp=localStorage.getItem(PIN_KEY)}catch(e){}if(pin===(sp||DEFAULT_PIN)){try{localStorage.setItem(AUTH_KEY,"pmo")}catch(e){}onLogin()}else setErr("Incorrect PIN.")};return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",justifyContent:"center",alignItems:"center"}}><div style={{background:"#fff",borderRadius:12,width:380,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}><div style={{background:"#282728",padding:"18px 24px",borderRadius:"12px 12px 0 0"}}><div style={{color:"#fff",fontSize:16,fontWeight:700}}>&#x1F512; PMO Access</div><div style={{color:"#A0A0A0",fontSize:11,marginTop:2}}>Enter PIN to unlock full PMO controls</div></div><div style={{padding:24}}><div style={{fontSize:12,color:"#555",marginBottom:12}}>PMO users can create, edit, delete resources and trigger onboarding emails. Leadership can browse in read-only mode.</div><input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Enter PIN" maxLength={10} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #E6E6E6",fontSize:15,textAlign:"center",letterSpacing:"0.3em",boxSizing:"border-box"}} autoFocus/>{err&&<div style={{fontSize:12,color:"#DA291C",marginTop:8,textAlign:"center"}}>{err}</div>}</div><div style={{padding:"12px 24px 20px",display:"flex",justifyContent:"flex-end",gap:10,borderTop:"1px solid #E6E6E6"}}><button onClick={onClose} style={{padding:"8px 20px",background:"#F5F5F5",border:"1px solid #E6E6E6",borderRadius:6,fontSize:13,cursor:"pointer"}}>Leadership View</button><button onClick={check} style={{padding:"8px 20px",background:"#86BC25",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer"}}>Unlock</button></div></div></div>};

/* ══════════ RESOURCE DETAIL MODAL ══════════ */
const ResourceModal=({resource,onClose,onSave,onDelete,isAdmin})=>{const [e,setE]=useState({...resource});const [tab,setTab]=useState("overview");const [confirmDel,setConfirmDel]=useState(false);const tabs=isAdmin?["overview","edit"]:["overview"];const tf=(l,k,t="text")=><div style={{marginBottom:12}}><label style={{fontSize:11,color:"#555",fontWeight:600,display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>{l}</label><input type={t} value={e[k]||""} onChange={ev=>setE({...e,[k]:ev.target.value})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #E6E6E6",fontSize:13,boxSizing:"border-box"}}/></div>;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:30,overflowY:"auto"}}><div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:700,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.2)",marginBottom:30}}>
    <div style={{background:"#282728",padding:"16px 24px",borderRadius:"12px 12px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{color:"#fff",fontSize:17,fontWeight:700}}>{e.name}</div><div style={{color:"#A0A0A0",fontSize:12,marginTop:2}}>{e.email||"Email not set"} &middot; {e.location||"Location TBD"}</div></div><button onClick={onClose} style={{background:"none",border:"none",color:"#A0A0A0",fontSize:22,cursor:"pointer",lineHeight:1}}>&times;</button></div>
    <div style={{display:"flex",borderBottom:"1px solid #E6E6E6",flexWrap:"wrap"}}>{[{l:"Initiative",v:e.initiative||"\u2014"},{l:"Status",v:e.status||"\u2014"},{l:"Region",v:e.region||"\u2014"},{l:"Level",v:e.level||"\u2014"}].map((s,i)=><div key={i} style={{flex:1,padding:"12px 14px",borderRight:i<3?"1px solid #E6E6E6":"none",textAlign:"center",minWidth:100}}><div style={{fontSize:10,color:"#888",textTransform:"uppercase",fontWeight:600}}>{s.l}</div><div style={{fontSize:14,fontWeight:700,marginTop:2}}>{s.v}</div></div>)}</div>
    {isAdmin&&e.email&&<div style={{padding:"14px 24px",background:"#F9F9F9",borderBottom:"1px solid #E6E6E6"}}><div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:8}}>Send Onboarding Emails</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><a href={emailWelcome(e)} target="_blank" rel="noopener" style={{padding:"8px 16px",background:"#86BC25",color:"#fff",borderRadius:6,fontSize:12,fontWeight:700,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>&#x1F4E7; Welcome & Onboarding</a><a href={emailAccessRequest(e)} target="_blank" rel="noopener" style={{padding:"8px 16px",background:"#00A3E0",color:"#fff",borderRadius:6,fontSize:12,fontWeight:700,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>&#x1F511; Access Request</a><a href={emailOnboardingNotification(e)} target="_blank" rel="noopener" style={{padding:"8px 16px",background:"#005587",color:"#fff",borderRadius:6,fontSize:12,fontWeight:700,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>&#x1F4CB; Onboarding Notification</a></div><div style={{fontSize:10,color:"#888",marginTop:6}}>Opens Outlook with pre-filled email. Attach CRBG PMO Reference Document manually for Welcome email.</div></div>}
    <div style={{display:"flex",borderBottom:"1px solid #E6E6E6"}}>{tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 0",fontSize:12,fontWeight:tab===t?700:400,color:tab===t?"#86BC25":"#555",background:"none",border:"none",borderBottom:tab===t?"3px solid #86BC25":"3px solid transparent",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em"}}>{t}</button>)}</div>
    <div style={{padding:24}}>{tab==="overview"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{[{l:"Function",v:e.function},{l:"Sub-Function",v:e.subFunction},{l:"Manager",v:e.manager},{l:"Feedback Provider",v:e.feedbackProvider},{l:"CRBG Manager",v:e.crbgManager},{l:"Onboarding Date",v:fmtDate(e.onboardingDate)},{l:"Offboarding Date",v:fmtDate(e.offboardingDate)},{l:"WBS Code",v:e.wbsCode},{l:"VDI Access",v:e.vdi},{l:"Category",v:e.category},{l:"CRBG Email",v:e.crbgEmail},{l:"Mobile",v:e.mobile}].map((x,i)=><div key={i} style={{padding:10,background:"#F9F9F9",borderRadius:6}}><div style={{fontSize:10,color:"#888",textTransform:"uppercase",fontWeight:600}}>{x.l}</div><div style={{fontSize:13,fontWeight:600,marginTop:2}}>{x.v||"\u2014"}</div></div>)}</div>}
    {tab==="edit"&&<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>{tf("Full Name","name")}{tf("Email","email")}{tf("Mobile","mobile")}{tf("Level","level")}{tf("Region","region")}{tf("Location","location")}{tf("Initiative","initiative")}{tf("Function","function")}{tf("Sub-Function","subFunction")}{tf("Manager","manager")}{tf("Feedback Provider","feedbackProvider")}{tf("CRBG Manager","crbgManager")}{tf("Status","status")}{tf("Onboarding Date","onboardingDate","date")}{tf("Offboarding Date","offboardingDate","date")}{tf("WBS Code","wbsCode")}{tf("Category","category")}{tf("VDI","vdi")}{tf("CRBG Email","crbgEmail")}</div><div style={{marginTop:20,padding:16,background:"#FFEBEE",borderRadius:8,border:"1px solid #DA291C"}}><div style={{fontSize:12,fontWeight:700,color:"#9C0006",marginBottom:6}}>&x26A0; Danger Zone</div>{!confirmDel?<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#9C0006"}}>Permanently remove this resource</span><button onClick={()=>setConfirmDel(true)} style={{padding:"5px 14px",background:"#fff",border:"1px solid #DA291C",borderRadius:6,fontSize:11,color:"#DA291C",cursor:"pointer",fontWeight:600}}>Delete</button></div>:<div><div style={{fontSize:12,color:"#9C0006",marginBottom:8}}>Type <b>{e.name.split(/[, ]/)[0]}</b> to confirm:</div><div style={{display:"flex",gap:8}}><input id="delC" style={{flex:1,padding:"6px 10px",borderRadius:6,border:"1px solid #DA291C",fontSize:12}}/><button onClick={()=>{if(document.getElementById("delC").value===e.name.split(/[, ]/)[0])onDelete(e.id);else alert("Name doesn't match.")}} style={{padding:"5px 14px",background:"#DA291C",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>Confirm</button><button onClick={()=>setConfirmDel(false)} style={{padding:"5px 14px",background:"#F5F5F5",border:"1px solid #E6E6E6",borderRadius:6,fontSize:11,cursor:"pointer"}}>Cancel</button></div></div>}</div></div>}</div>

tems:"center",gap:10}}><span style={{fontSize:18}}>&#x1F4CB;</span><div><div>3. Onboarding Notification to Team</div><div style={{fontSize:10,fontWeight:400,opacity:0.9,marginTop:2}}>Notifies navigate team to initiate onboarding</div></div></a></div></div><div style={{padding:"12px 24px 20px",display:"flex",justifyContent:"center",borderTop:"1px solid #E6E6E6"}}><button onClick={onClose} style={{padding:"8px 24px",background:"#F5F5F5",border:"1px solid #E6E6E6",borderRadius:6,fontSize:13,cursor:"pointer"}}>Done</button></div></div></div>}
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:200,display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:40,overflowY:"auto"}}><div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:560,boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}><div style={{background:"#282728",padding:"16px 24px",borderRadius:"12px 12px 0 0"}}><div style={{color:"#fff",fontSize:16,fontWeight:700}}>Add New Resource</div><div style={{color:"#A0A0A0",fontSize:11,marginTop:2}}>3 onboarding emails will be triggered after adding</div></div><div style={{padding:24}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>{tf("Full Name *","name")}{tf("Email *","email")}{tf("Mobile","mobile")}{tf("Level","level")}{tf("Region","region")}{tf("Location","location")}{tf("Initiative","initiative")}{tf("Function","function")}{tf("Manager","manager")}{tf("Feedback Provider","feedbackProvider")}{tf("CRBG Manager","crbgManager")}{tf("Status","status")}{tf("Onboarding Date","onboardingDate","date")}{tf("WBS Code","wbsCode")}</div></div><div style={{padding:"12px 24px 20px",display:"flex",justifyContent:"flex-end",gap:10,borderTop:"1px solid #E6E6E6"}}><button onClick={onClose} style={{padding:"8px 20px",background:"#F5F5F5",border:"1px solid #E6E6E6",borderRadius:6,fontSize:13,cursor:"pointer"}}>Cancel</button><button onClick={doAdd} style={{padding:"8px 20px",background:fm.name.trim()?"#86BC25":"#ccc",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:700,cursor:fm.name.trim()?"pointer":"not-allowed"}}>Add & Send Emails &rarr;</button></div></div></div>};

/* ══════════ MAIN APP ══════════ */
function App(){const [resources,setResources]=useState([]);const [page,setPage]=useState("overview");const [selId,setSelId]=useState(null);const [filter,setFilter]=useState("All");const [search,setSearch]=useState("");const [showAdd,setShowAdd]=useState(false);const [sideOpen,setSideOpen]=useState(true);const [loaded,setLoaded]=useState(false);const [isAdmin,setIsAdmin]=useState(false);const [showLogin,setShowLogin]=useState(false);const [sort,setSort]=useState({field:"",asc:true});const toggleSort=field=>setSort(prev=>({field,asc:prev.field===field?!prev.asc:true}));
  useEffect(()=>{try{if(localStorage.getItem(AUTH_KEY)==="pmo")setIsAdmin(true)}catch(e){}},[]);
  useEffect(()=>{try{const s=localStorage.getItem(SK);setResources(s?JSON.parse(s):DEFAULT_RESOURCES)}catch(e){setResources(DEFAULT_RESOURCES)}setLoaded(true)},[]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(SK,JSON.stringify(resources))}catch(e){}},[resources,loaded]);
  const save=u=>{if(!isAdmin)return;setResources(p=>p.map(i=>i.id===u.id?u:i));setSelId(null)};const deleteRes=id=>{if(!isAdmin)return;setResources(p=>p.filter(i=>i.id!==id));setSelId(null)};const add=n=>{if(!isAdmin)return;setResources(p=>[...p,n])};const logout=()=>{setIsAdmin(false);try{localStorage.removeItem(AUTH_KEY)}catch(e){}};const reset=()=>{if(!isAdmin)return;if(confirm("Reset ALL data to workbook defaults?")){setResources(DEFAULT_RESOURCES);localStorage.removeItem(SK)}};const nid=resources.length?Math.max(...resources.map(i=>i.id))+1:1;

  const byManager=useMemo(()=>{const m={};resources.filter(r=>r.status!=="Offboarded"&&r.manager).forEach(r=>{m[r.manager]=(m[r.manager]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[resources]);
  const byFeedback=useMemo(()=>{const m={};resources.filter(r=>r.status!=="Offboarded"&&r.feedbackProvider).forEach(r=>{m[r.feedbackProvider]=(m[r.feedbackProvider]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[resources]);
  const byLocation=useMemo(()=>{const m={};resources.forEach(r=>{if(r.location)m[r.location]=(m[r.location]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[resources]);
  const byRegion=useMemo(()=>{const m={};resources.filter(r=>r.status!=="Offboarded").forEach(r=>{const k=r.region||"\u2014";m[k]=(m[k]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[resources]);
  const byLevel=useMemo(()=>{const m={};resources.filter(r=>r.status!=="Offboarded").forEach(r=>{const k=r.level||"\u2014";m[k]=(m[k]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[resources]);
  const filtered=useMemo(()=>{let d=filter==="All"?resources:filter==="Active"?resources.filter(r=>r.status!=="Offboarded"):filter==="Offboarded"?resources.filter(r=>r.status==="Offboarded"):resources;if(search.trim()){const s=search.toLowerCase();d=d.filter(r=>(r.name+r.email+r.location+r.initiative+r.manager+r.function+r.crbgManager).toLowerCase().includes(s))}if(sort.field){d=[...d].sort((a,b)=>{let va=String(a[sort.field]||"").toLowerCase(),vb=String(b[sort.field]||"").toLowerCase();if(va<vb)return sort.asc?-1:1;if(va>vb)return sort.asc?1:-1;return 0})}return d},[resources,filter,search,sort]);
  const sel=resources.find(r=>r.id===selId);const maxInit=Math.max(...byInitiative.map(x=>x[1]),1);const maxLoc=Math.max(...byLocation.map(x=>x[1]),1);
  const NAV=[{id:"overview",icon:"\uD83D\uDCCA",label:"PMO Dashboard"},{id:"roster",icon:"\uD83D\uDC65",label:"Resource Tracker"},{id:"analytics",icon:"\uD83D\uDCC8",label:"Analytics & Reports"}];

  <div className="no-print" style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,background:isAdmin?"rgba(134,188,37,0.2)":"rgba(255,255,255,0.1)",border:isAdmin?"1px solid #86BC25":"1px solid #555"}}><span style={{fontSize:10}}>{isAdmin?"\uD83D\uDD13":"\uD83D\uDD12"}</span><span style={{fontSize:11,fontWeight:600,color:isAdmin?"#86EB22":"#A0A0A0"}}>{isAdmin?"PMO \u2014 Full Access":"Leadership View"}</span></div>
  {isAdmin?<><button onClick={()=>setShowAdd(true)} style={{padding:"5px 14px",background:"#86BC25",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add Resource</button><button onClick={()=>downloadCSV(resources,"CRBG_Resource_Tracker")} style={{padding:"5px 12px",background:"transparent",border:"1px solid #555",borderRadius:6,fontSize:11,color:"#E6E6E6",cursor:"pointer"}}>Export CSV</button><button onClick={()=>window.print()} style={{padding:"5px 12px",background:"transparent",border:"1px solid #555",borderRadius:6,fontSize:11,color:"#E6E6E6",cursor:"pointer"}}>Print</button><button onClick={logout} style={{padding:"5px 12px",background:"transparent",border:"1px solid #DA291C",borderRadius:6,fontSize:11,color:"#DA291C",cursor:"pointer"}}>Logout</button></>:<><button onClick={()=>window.print()} style={{padding:"5px 12px",background:"transparent",border:"1px solid #555",borderRadius:6,fontSize:11,color:"#E6E6E6",cursor:"pointer"}}>Print</button><button onClick={()=>setShowLogin(true)} style={{padding:"5px 14px",background:"#86BC25",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>{"\uD83D\uDD10"} PMO Login</button></>}</div></div>

  {!isAdmin&&<div className="no-print" style={{background:"#E3F2FD",border:"1px solid #00A3E0",borderRadius:8,padding:"10px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:"#005587"}}>{"\uD83D\uDD12"} <b>Leadership View</b> &mdash; read-only. PMO login required to manage resources and trigger onboarding emails.</div><button onClick={()=>setShowLogin(true)} style={{padding:"4px 14px",background:"#00A3E0",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>PMO Login</button></div>}

  {page==="overview"&&<><div style={{marginBottom:24}}><div style={{fontSize:22,fontWeight:700}}>Corebridge &mdash; Resource Tracker</div><div style={{fontSize:13,color:"#888",marginTop:2}}>PMO Dashboard &middot; {total} team members &middot; {new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})}</div></div>
  <div style={{display:"flex",gap:14,marginBottom:24,flexWrap:"wrap"}}>{[{l:"Total Team",v:total,a:"#282728"},{l:"Active / Onboarded",v:activeCount,a:"#86BC25"},{l:"Offboarded",v:offboarded,a:"#888"},{l:"Initiatives",v:byInitiative.filter(x=>x[0]!=="Unassigned").length,a:"#00A3E0"},{l:"Regions",v:byRegion.length,a:"#005587"},{l:"Locations",v:byLocation.length,a:"#E8A317"}].map((k,i)=><div key={i} onClick={()=>downloadCSV(resources,k.l.replace(/\s/g,"_"))} style={{flex:1,background:"#fff",borderRadius:10,padding:"20px 22px",borderTop:"4px solid "+k.a,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",cursor:"pointer",minWidth:130,transition:"transform 0.15s,box-shadow 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.1)"}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{k.l}</div><div style={{fontSize:32,fontWeight:700,marginTop:4,lineHeight:1}}>{k.v}</div></div>)}</div>

  <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>{["All","Active","Offboarded"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 16px",background:filter===f?"#282728":"#fff",color:filter===f?"#fff":"#555",border:"1px solid #E6E6E6",borderRadius:20,fontSize:12,fontWeight:filter===f?700:400,cursor:"pointer"}}>{f} ({f==="All"?total:f==="Active"?activeCount:offboarded})</button>)}<input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, email, initiative, manager..." style={{padding:"6px 14px",borderRadius:20,border:"1px solid #E6E6E6",fontSize:12,width:300}}/><div style={{marginLeft:"auto",fontSize:11,color:"#888"}}>{filtered.length} of {total}</div></div>
  <div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",overflow:"hidden"}}><div style={{overflowX:"auto",maxHeight:"calc(100vh - 240px)"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#282728",position:"sticky",top:0,zIndex:2}}><SortHeader label="Name" field="name" sortState={sort} onSort={toggleSort}/><SortHeader label="Level" field="level" sortState={sort} onSort={toggleSort}/><SortHeader label="Email" field="email" sortState={sort} onSort={toggleSort}/><SortHeader label="Region" field="region" sortState={sort} onSort={toggleSort}/><SortHeader label="Location" field="location" sortState={sort} onSort={toggleSort}/><SortHeader label="Initiative" field="initiative" sortState={sort} onSort={toggleSort}/><SortHeader label="Manager" field="manager" sortState={sort} onSort={toggleSort}/><SortHeader label="CRBG Manager" field="crbgManager" sortState={sort} onSort={toggleSort}/><SortHeader label="Status" field="status" sortState={sort} onSort={toggleSort}/>{isAdmin&&<th style={{padding:"10px 10px",color:"#E6E6E6",fontSize:10,fontWeight:600,textTransform:"uppercase",whiteSpace:"nowrap"}}>Emails</th>}</tr></thead>
  <tbody>{filtered.map((r,idx)=><tr key={r.id} style={{background:idx%2===0?"#fff":"#FAFAFA",borderBottom:"1px solid #F0F0F0"}}><td onClick={()=>setSelId(r.id)} style={{padding:"10px 10px",fontWeight:600,whiteSpace:"nowrap",cursor:"pointer"}}>{r.name}</td><td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.level||"\u2014"}</td><td style={{padding:"10px 10px",fontSize:11,color:"#555"}}>{r.email||"\u2014"}</td><td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.region||"\u2014"}</td><td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.location||"\u2014"}</td><td style={{padding:"10px 10px",color:r.initiative?"#282728":"#E8A317",fontWeight:r.initiative?400:600,fontSize:11}}>{r.initiative||"\u2014"}</td><td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.manager||"\u2014"}</td><td style={{padding:"10px 10px",color:"#666",fontSize:11}}>{r.crbgManager||"\u2014"}</td><td style={{padding:"10px 10px"}}><StatusBadge status={r.status}/></td>{isAdmin&&<td style={{padding:"10px 6px",whiteSpace:"nowrap"}}><div style={{display:"flex",gap:3}}><a href={emailWelcome(r)} target="_blank" rel="noopener" title="Welcome & Onboarding" style={{padding:"3px 6px",background:"#86BC25",color:"#fff",borderRadius:4,fontSize:9,fontWeight:700,textDecoration:"none"}}>{"\uD83D\uDCE7"}</a><a href={emailAccessRequest(r)} target="_blank" rel="noopener" title="Access Request" style={{padding:"3px 6px",background:"#00A3E0",color:"#fff",borderRadius:4,fontSize:9,fontWeight:700,textDecoration:"none"}}>{"\uD83D\uDD11"}</a><a href={emailOnboardingNotification(r)} target="_blank" rel="noopener" title="Onboarding Notification" style={{padding:"3px 6px",background:"#005587",color:"#fff",borderRadius:4,fontSize:9,fontWeight:700,textDecoration:"none"}}>{"\uD83D\uDCCB"}</a></div></td>}</tr>)}</tbody></table></div></div></>}

  {page==="analytics"&&<><SectionTitle icon={"\uD83D\uDCC8"} title="Analytics & Reports" sub="Breakdowns by initiative, manager, feedback provider, region, location, and level"/>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
  <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Team Count by Initiative</div>{byInitiative.map(([init,cnt],i)=><div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{init}</span><span style={{fontWeight:700}}>{cnt}</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:14}}><div style={{width:(cnt/maxInit*100)+"%",height:"100%",background:"#86BC25",borderRadius:4,minWidth:14}}/></div></div>)}</div>
  <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Team Count by Manager</div>{byManager.length===0?<div style={{color:"#888",fontSize:12,textAlign:"center",padding:20}}>No manager data populated yet</div>:byManager.slice(0,12).map(([m,c],i)=><div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{m}</span><span style={{fontWeight:700}}>{c}</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:14}}><div style={{width:(c/Math.max(...byManager.map(x=>x[1]),1)*100)+"%",height:"100%",background:"#00A3E0",borderRadius:4,minWidth:14}}/></div></div>)}</div>
  <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Team Count by Feedback Provider</div>{byFeedback.length===0?<div style={{color:"#888",fontSize:12,textAlign:"center",padding:20}}>No feedback provider data populated yet</div>:byFeedback.slice(0,12).map(([fp,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"6px 0",borderBottom:"1px solid #F0F0F0"}}><span style={{fontWeight:600}}>{fp}</span><span style={{fontWeight:700}}>{c}</span></div>)}</div>
  <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Distribution by Region</div>{byRegion.map(([r,c],i)=>{const pct=activeCount?Math.round(c/activeCount*100):0;return <div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{r}</span><span style={{fontWeight:700}}>{c} ({pct}%)</span></div><div style={{background:"#E6E6E6",borderRadius:4,height:14}}><div style={{width:pct+"%",height:"100%",background:"#005587",borderRadius:4,minWidth:14}}/></div></div>})}</div>
  <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>By Level</div>{byLevel.map(([l,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"6px 0",borderBottom:"1px solid #F0F0F0"}}><span style={{fontWeight:600}}>{l}</span><span style={{fontWeight:700}}>{c}</span></div>)}</div>
  <div style={{background:"#fff",borderRadius:10,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Status Summary</div><div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{(()=>{const m={};resources.forEach(r=>{const s=r.status||"Unknown";m[s]=(m[s]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([s,c],i)=><div key={i} style={{background:"#F9F9F9",borderRadius:8,padding:"14px 20px",minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>{s}</div><div style={{fontSize:28,fontWeight:700}}>{c}</div></div>)})()}</div></div>
  </div></>}

  </div></div>
  {sel&&<ResourceModal resource={sel} onClose={()=>setSelId(null)} onSave={save} onDelete={deleteRes} isAdmin={isAdmin}/>}
  {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={add} nid={nid}/>}
  {showLogin&&<AdminLogin onLogin={()=>{setIsAdmin(true);setShowLogin(false)}} onClose={()=>setShowLogin(false)}/>}
  </div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
